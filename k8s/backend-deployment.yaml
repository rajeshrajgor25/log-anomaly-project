apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-anomaly-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-anomaly-backend
  template:
    metadata:
      labels:
        app: log-anomaly-backend
    spec:
      containers:
      - name: backend
        image: log-anomaly-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONUNBUFFERED
          value: "1"

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: log-anomaly-backend
spec:
  selector:
    app: log-anomaly-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP