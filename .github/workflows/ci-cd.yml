name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        run: pytest || echo "No tests yet"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build -f docker/Dockerfile.backend \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./frontend
        run: pip install -r requirements.txt

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build frontend image
        run: |
          docker build -f docker/Dockerfile.frontend \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest .

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment: production
    if: false   # Disabled: minikube runs locally and is not reachable from GitHub runners.
                # To enable: set up a self-hosted runner OR use a cloud k8s cluster
                # and replace KUBECONFIG_B64 secret with that cluster's kubeconfig.
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify deployments exist
        run: |
          kubectl get deployment log-anomaly-backend -n production || exit 1
          kubectl get deployment log-anomaly-frontend -n production || exit 1

      - name: Deploy backend
        run: |
          kubectl set image deployment/log-anomaly-backend \
          backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} \
          -n production

      - name: Deploy frontend
        run: |
          kubectl set image deployment/log-anomaly-frontend \
          frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} \
          -n production

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/log-anomaly-backend -n production --timeout=5m
          kubectl rollout status deployment/log-anomaly-frontend -n production --timeout=5m

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f $HOME/.kube/config